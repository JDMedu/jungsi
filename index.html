<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정시 지원 가능 대학 검색기</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root{
    --ink:#16213a; --ink-soft:#43506b; --line:#e3e8f0; --line-soft:#eef1f6;
    --bg:#f4f6fa; --card:#ffffff; --accent:#3b5bdb; --accent-soft:#eaeefb;
    --reach:#e8590c; --reach-bg:#fdf0e7; --fit:#3b5bdb; --fit-bg:#eaeefb;
    --safe:#2b8a6e; --safe-bg:#e6f3ee; --muted:#8a93a6;
    --shadow:0 1px 2px rgba(22,33,58,.04),0 6px 24px rgba(22,33,58,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Pretendard","Pretendard Variable",system-ui,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.5;
    -webkit-font-smoothing:antialiased;font-feature-settings:"tnum";}
  .wrap{max-width:1080px;margin:0 auto;padding:0 18px 80px}

  header.top{padding:30px 0 22px}
  .brand{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  .brand h1{font-size:23px;font-weight:800;letter-spacing:-.02em}
  .brand .sub{font-size:13px;color:var(--muted);font-weight:500}
  .status{margin-top:10px;font-size:12.5px;color:var(--ink-soft);
    display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .dot{width:7px;height:7px;border-radius:50%;background:#cbd2df;flex:none}
  .dot.ok{background:#2b8a6e}.dot.err{background:#e03131}
  .reload{font-size:12px;color:var(--accent);background:none;border:none;
    cursor:pointer;font-family:inherit;font-weight:600;padding:0;text-decoration:underline}
  .upload{font-size:12px;color:var(--ink-soft);cursor:pointer;font-weight:600}
  .upload input{display:none}
  .databar{display:flex;justify-content:space-between;align-items:center;gap:14px;
    flex-wrap:wrap;margin-top:12px}
  .dbtns{display:flex;gap:8px}
  .btn{font-family:inherit;font-size:13px;font-weight:700;border:none;border-radius:9px;
    padding:9px 15px;cursor:pointer;background:var(--ink);color:#fff;transition:.15s;
    display:inline-flex;align-items:center;gap:6px}
  .btn:hover{opacity:.88}
  .btn.ghost{background:var(--accent-soft);color:var(--accent)}
  .btn input{display:none}

  .controls{background:var(--card);border:1px solid var(--line);border-radius:16px;
    box-shadow:var(--shadow);padding:6px;display:flex;gap:6px;margin-bottom:8px}
  .tab{flex:1;padding:13px;border:none;background:none;border-radius:11px;cursor:pointer;
    font-family:inherit;font-size:15px;font-weight:700;color:var(--ink-soft);transition:.15s}
  .tab.active{background:var(--ink);color:#fff}
  .tab:not(.active):hover{background:var(--line-soft)}

  .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;
    box-shadow:var(--shadow);padding:22px;margin-bottom:18px}
  .row{display:flex;gap:22px;flex-wrap:wrap;align-items:flex-end}
  .field{display:flex;flex-direction:column;gap:7px}
  .field label{font-size:12.5px;font-weight:700;color:var(--ink-soft)}
  .field .hint{font-size:11.5px;color:var(--muted);font-weight:500}
  input[type=number],input[type=text]{font-family:inherit;font-size:16px;font-weight:600;
    color:var(--ink);border:1.5px solid var(--line);border-radius:10px;padding:11px 13px;
    background:#fbfcfe;transition:.15s;width:100%}
  input:focus{outline:none;border-color:var(--accent);background:#fff;
    box-shadow:0 0 0 3px var(--accent-soft)}
  .grade-in{width:120px;font-size:22px;font-weight:800;text-align:center}
  .margin-in{width:78px;text-align:center}
  .search-in{width:100%;font-size:17px}

  .seg{display:inline-flex;background:var(--line-soft);border-radius:10px;padding:4px;gap:2px}
  .seg button{border:none;background:none;font-family:inherit;font-size:13.5px;font-weight:700;
    color:var(--ink-soft);padding:8px 16px;border-radius:7px;cursor:pointer;transition:.15s}
  .seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(22,33,58,.12)}

  .summary{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0 4px}
  .chip{font-size:12.5px;font-weight:700;padding:7px 13px;border-radius:99px;display:flex;align-items:center;gap:6px}
  .chip b{font-weight:800}
  .chip.reach{background:var(--reach-bg);color:var(--reach)}
  .chip.fit{background:var(--fit-bg);color:var(--fit)}
  .chip.safe{background:var(--safe-bg);color:var(--safe)}
  .chip.total{background:var(--ink);color:#fff}

  .results{margin-top:14px}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  thead th{text-align:left;font-size:11.5px;font-weight:700;color:var(--muted);
    padding:0 12px 10px;border-bottom:1.5px solid var(--line);white-space:nowrap}
  thead th.num{text-align:right}
  tbody td{padding:13px 12px;border-bottom:1px solid var(--line-soft);vertical-align:middle}
  tbody td.num{text-align:right;font-weight:600;font-variant-numeric:tabular-nums}
  tbody tr:hover{background:#fafbfd}
  .uni{font-weight:800;color:var(--ink)}
  .dept{font-weight:600}
  .typename{font-size:12px;color:var(--muted);font-weight:500}
  td.cut-on{color:var(--ink);font-weight:800}
  td.cut-off{color:var(--muted)}
  .na{color:#c3cad6;font-weight:600}

  .tag{font-size:11px;font-weight:800;padding:3px 8px;border-radius:6px;white-space:nowrap}
  .tag.gyo{background:#eef1f6;color:#43506b}
  .tag.jong{background:#f0ebf9;color:#7048a8}
  .tag.humn{background:#eaeefb;color:#3b5bdb}
  .tag.natu{background:#e6f3ee;color:#2b8a6e}
  .tag.arts{background:#fbeaf2;color:#c2255c}
  .tag.undf{background:#f1f3f7;color:#8a93a6}
  .zone{font-size:11.5px;font-weight:800;padding:4px 10px;border-radius:99px;white-space:nowrap}
  .zone.reach{background:var(--reach-bg);color:var(--reach)}
  .zone.fit{background:var(--fit-bg);color:var(--fit)}
  .zone.safe{background:var(--safe-bg);color:var(--safe)}

  .empty{text-align:center;padding:54px 20px;color:var(--muted)}
  .empty .big{font-size:15px;font-weight:700;color:var(--ink-soft);margin-bottom:6px}
  .empty .sm{font-size:13px}
  .hl{color:var(--accent);font-weight:800}

  @media(max-width:680px){
    .wrap{padding:0 12px 60px}
    thead{display:none}
    table,tbody,tr,td{display:block;width:100%}
    tbody tr{border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:10px}
    tbody td{border:none;padding:3px 0;text-align:left}
    tbody td.num{text-align:left}
    tbody td[data-l]:before{content:attr(data-l);font-size:11px;color:var(--muted);
      font-weight:700;display:inline-block;min-width:74px}
    tbody tr:hover{background:none}
  }
</style>
<style>
  .inputs-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .inputs-grid .field input{width:100%;text-align:center;font-size:18px}
  .grade-row{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;margin-top:14px}
  .converter{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--accent-soft);
    border-radius:12px;padding:12px 16px;margin-bottom:16px}
  .converter .conv-label{font-weight:700;font-size:13px;color:var(--accent)}
  .converter input{width:90px;text-align:center;font-size:16px;font-weight:700;padding:8px 10px}
  .conv-arrow{color:var(--muted);font-weight:800}
  .conv-out{font-size:14px;font-weight:700;color:var(--ink)}
  .conv-out b{font-size:19px;color:var(--accent)}
  .conv-hint{font-size:11.5px;color:var(--muted);flex-basis:100%}
  .myavg{background:var(--ink);color:#fff;border-radius:12px;padding:12px 18px;display:inline-flex;
    align-items:baseline;gap:8px;font-weight:700}
  .myavg b{font-size:24px;font-weight:800}
  .tag.gun{background:#fff4e6;color:#e8590c}
  @media(max-width:680px){ .inputs-grid{grid-template-columns:repeat(2,1fr)} }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <h1>정시 지원 가능 대학 검색기</h1>
      <span class="sub">수능 평균백분위 기준 · 가 / 나 / 다군</span>
    </div>
    <div class="databar">
      <div class="status" id="status"><span class="dot" id="dot"></span>
        <span id="statusText">데이터를 불러오는 중…</span></div>
      <div class="dbtns">
        <label class="btn" id="uploadBtn">엑셀 업로드
          <input type="file" id="fileInput" accept=".xlsx,.xls,.json"></label>
        <button class="btn ghost" id="jsonBtn" hidden>JSON으로 저장</button>
      </div>
    </div>
  </header>

  <div class="controls">
    <button class="tab active" data-mode="predict">성적으로 찾기</button>
    <button class="tab" data-mode="search">학교 · 학과 검색</button>
  </div>

  <div class="panel" id="filterPanel">
    <div class="row" style="gap:28px">
      <div class="field"><label>모집군</label>
        <div class="seg" id="gunSeg">
          <button data-g="all" class="on">전체</button>
          <button data-g="가">가군</button>
          <button data-g="나">나군</button>
          <button data-g="다">다군</button>
        </div></div>
      <div class="field"><label>계열</label>
        <div class="seg" id="trackSeg">
          <button data-k="all" class="on">전체</button>
          <button data-k="인문">인문</button>
          <button data-k="자연">자연</button>
          <button data-k="예체능">예체능</button>
        </div></div>
      <div class="field"><label>합격선 기준</label>
        <div class="seg" id="cutSeg">
          <button data-c="50">50%컷</button>
          <button data-c="70" class="on">70%컷</button>
        </div>
        <span class="hint">70%컷이 더 보수적(안정)인 기준입니다</span></div>
    </div>
  </div>

  <div class="panel" id="predictPanel">
    <div class="converter">
      <span class="conv-label">등급 → 백분위 변환</span>
      <input type="number" id="convGrade" step="0.1" min="1" max="9" placeholder="2.3">
      <span class="conv-arrow">→</span>
      <span class="conv-out">≈ 백분위 <b id="convPct">–</b></span>
      <span class="conv-hint">등급만 알 때 어림값으로 쓰세요. 나온 백분위를 아래 과목 칸에 넣으면 됩니다. (등급은 구간이라 정확값 아님)</span>
    </div>
    <div class="inputs-grid">
      <div class="field"><label>국어 백분위</label><input type="number" id="korIn" min="0" max="100" placeholder="90"></div>
      <div class="field"><label>수학 백분위</label><input type="number" id="matIn" min="0" max="100" placeholder="90"></div>
      <div class="field"><label>탐구1 백분위</label><input type="number" id="t1In" min="0" max="100" placeholder="90"></div>
      <div class="field"><label>탐구2 백분위</label><input type="number" id="t2In" min="0" max="100" placeholder="90"></div>
    </div>
    <div class="grade-row">
      <div class="field"><label>영어 등급</label><input type="number" id="engIn" class="margin-in" min="1" max="9" placeholder="2"></div>
      <div class="field"><label>한국사 등급</label><input type="number" id="hisIn" class="margin-in" min="1" max="9" placeholder="3"></div>
      <div class="field"><label>상향 여유 (백분위)</label><input type="number" id="upIn" class="margin-in" step="0.5" min="0" value="2"></div>
      <div class="field"><label>하향 여유 (백분위)</label><input type="number" id="downIn" class="margin-in" step="0.5" min="0" value="3"></div>
      <div class="field" style="flex:1;min-width:150px"><label>&nbsp;</label>
        <div class="myavg" id="myAvgBox" hidden>내 평균백분위 <b id="myAvg">–</b></div></div>
    </div>
    <span class="hint" id="windowHint" style="display:block;margin-top:12px">국어·수학·탐구 백분위를 입력하면 평균백분위로 지원 가능 학과를 찾습니다. (영어·한국사는 참고용 — 대학마다 반영방식이 달라 매칭엔 미반영)</span>
    <div class="summary" id="summary" hidden></div>
  </div>

  <div class="panel" id="searchPanel" hidden>
    <div class="field"><label>대학명 또는 학과명 검색</label>
      <input type="text" id="searchIn" class="search-in" placeholder="예: 가톨릭 · 인공지능 · 자연공학">
      <span class="hint">일부만 입력해도 됩니다.</span></div>
  </div>

  <div class="results" id="results"></div>
</div>
<script>
const JSON_URL = "data_정시.json";
const XLSX_URL = "대학어_정시.xlsx";
const RAW_KEYS = ["대학","군","전형명","모집단위","최종모집","경쟁률","충원",
  "국50","수50","탐50","평균50","한국사50","영어50","국70","수70","탐70","평균70","한국사70","영어70","계열"];
let DATA = [];
let mode = "predict", gunFilter = "all", trackFilter = "all", cut = "70";
const $ = s => document.querySelector(s);
const num = v => { const n = parseFloat(v); return Number.isFinite(n) ? n : null; };
const r1 = v => Math.round(v*10)/10;

/* 등급 → 백분위 변환 (표준 9등급 누적비율 기반, 소수등급은 구간 내 비례) */
const GRADE_CUM = [0,4,11,23,40,60,77,89,96,100]; // 각 등급 끝의 상위 누적%
function gradeToPct(g){
  if(g==null || g<1) return null;
  let gi=Math.min(Math.floor(g),9); if(gi<1) gi=1;
  const frac=Math.min(Math.max(g-gi,0),1);
  const cum=GRADE_CUM[gi-1] + frac*(GRADE_CUM[gi]-GRADE_CUM[gi-1]);
  return Math.max(0, Math.min(100, Math.round(100-cum)));
}
/* 백분위 → 등급 변환 (위 구간을 역산, 근삿값) */
function pctToGrade(p){
  if(p==null) return null;
  const cum = Math.max(0, Math.min(100, 100 - p));
  for(let g=1; g<=9; g++){
    if(cum < GRADE_CUM[g] || g===9){
      const lo=GRADE_CUM[g-1], hi=GRADE_CUM[g];
      const frac = hi>lo ? (cum-lo)/(hi-lo) : 0;
      return r1(Math.min(9, Math.max(1, g + frac)));
    }
  }
  return null;
}

/* ---------- 계열 분류 (인문/자연/예체능/미정) ---------- */
/* 우선순위: ①엑셀 계열열/JSON값 → ②이름의 (인문)/(자연)/(예체능)·계열표기 → ③보정목록 → ④키워드 자동분류
   미분류·모호는 ""(전체에서만 표시). 1,245개 학과 기준 약 97% 자동 분류. */
const TRACK_OVERRIDE = {
  "금융・빅데이터학부":"인문","금융·빅데이터학부":"인문","정치외교학과":"인문","의료산업경영학과":"인문",
  "패션산업학과":"인문","정보사회학과":"인문","공간디자인・소비자학과":"예체능","공간디자인·소비자학과":"예체능",
  "의류학과":"인문","보험계리학과":"자연","호텔조리학과":"예체능","바이오식품외식산업학과":"자연",
  "식품자원경제학과":"자연","도시사회학과":"인문","도시행정학과":"인문","보건경영학과":"인문","보건행정학과":"인문",
  "보건정책관리학부":"인문","재활복지학과":"인문","재활상담학":"인문","재활상담학과":"인문","경호학과":"예체능",
  "항공서비스학과":"인문","항공운항학과":"자연","부동산학과":"인문","ELLT학과":"인문","KFL학부":"인문","MSDE학과":"자연",
  "성서학과":"인문","대순종학과":"인문","국가안보학과":"인문","사이버국방학과":"자연","Art & Design대학":"예체능",
  "FineArts학부":"예체능","아트&테크놀로지학과":"예체능","아트앤테크놀로지학과":"예체능","영상학과":"예체능",
  "의류산업학과":"예체능","의류산업학전공":"예체능","의상학과":"예체능","문예창작학":"인문","문예창작학과":"인문",
  "문예콘텐츠창작학과":"인문","Global Business & Technology학부":"인문","Language & Diplomacy학부":"인문",
  "Language & Trade학부":"인문","공공인재빅데이터융합학":"인문","미디어소프트웨어학과":"자연",
  "사이버드론봇군사학과":"자연","앙트러프러너리얼리더십학부 앙트러프러너십전공":"인문","앙트러프러너십전공":"인문",
  "테슬(TESL)전공":"인문",
};
const YE_KW = ["미술","회화","조소","조각","동양화","서양화","한국화","공예","도예","도자","조형","디자인","일러스트",
  "만화","애니","음악","관현악","국악","성악","작곡","피아노","기악","실용음악","연극","연기","뮤지컬","무용","발레",
  "영화","영상","공연","연출","무대","체육","스포츠","태권도","유도","검도","무도","골프","경호","레저","헬스","피트니스",
  "뷰티","메이크업","헤어","미용","모델","예술","예능","의상","운동","아트","Art","Design","Fine"];

  "정보보호","반도체","디스플레이","신소재","건축","건설","토목","도시","조경","식품","바이오","나노","배터리","클라우드",

function classifyTrack(name){
  if(!name) return "";
  if(TRACK_OVERRIDE[name]) return TRACK_OVERRIDE[name];
  const nn = name.replace(/\s/g,"");
  if(nn.includes("예체능")||name.includes("(예능)")) return "예체능";
  if(nn.includes("이공계열")||nn.includes("자연계열")||name.includes("(자연)")) return "자연";
  if(nn.includes("인문사회")||nn.includes("인문계열")||name.includes("(인문)")||nn.includes("인문대학")||nn.includes("인문학부")||nn.includes("문과대학")) return "인문";
  if((nn.includes("공학")||nn.includes("공과")) && !nn.includes("전공학")) return "자연";   // 공학 강제('전공학부' 오인 방지)
  if(nn.includes("경영")) return "인문";                        // 경영 주축
  const ye  = YE_KW.some(k=>nn.includes(k));
  const nat = NAT_KW.some(k=>nn.includes(k)) || (nn.includes("화학") && !nn.includes("문화"));
  const hum = HUM_KW.some(k=>nn.includes(k));
  const za  = ZA_KW.some(k=>nn.includes(k));
  if(ye && !(nat && !hum)) return "예체능";
  if(nat && !hum) return "자연";
  if(hum && !nat) return "인문";
  if(za) return "미정";
  return "자연";   // 그 외(모호·미분류)는 기본적으로 이과(자연)로 배정
}

/* ---------- 정시 엑셀 파싱 (군=가/나/다 행이 데이터) ---------- */
function tamMean(arr){
  const ns = arr.map(num).filter(v=>v!=null);
  return ns.length ? r1(ns.reduce((a,b)=>a+b,0)/ns.length) : null;
}
function parseJeongsi(wb){
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, {header:1, raw:true, defval:null});
  let uni=null, label="";
  const out=[];
  for(const r of rows){
    if(r[0]!=null && String(r[0]).trim()!=="") uni = String(r[0]).trim();
    const g = r[1]!=null ? String(r[1]).trim() : "";
    if(g.startsWith("수능")) label = g;
    if(!g.startsWith("정시(")) continue;
    out.push({
      대학: uni, 군: g.replace("정시","").replace(/[()]/g,"").trim(), 전형명: label,
      모집단위: r[2]!=null ? String(r[2]).trim() : "",
      최종모집: num(r[5]), 경쟁률: num(r[6]), 충원: num(r[7]),
      국50:num(r[10]), 수50:num(r[11]), 탐50:tamMean([r[12],r[13],r[14],r[15],r[16],r[17]]),
      평균50:num(r[18]), 한국사50:num(r[19]), 영어50:num(r[20]),
      국70:num(r[21]), 수70:num(r[22]), 탐70:tamMean([r[23],r[24],r[25],r[26],r[27],r[28]]),
      평균70:num(r[29]), 한국사70:num(r[30]), 영어70:num(r[31]),
    });
  }
  return out;
}
function withTrack(rows){
  return rows.map(d=>{
    const t=["인문","자연","예체능","미정"].includes(d.계열)?d.계열:classifyTrack(d.모집단위);
    return {...d, 계열:t};
  });
}

/* ---------- 데이터 로드 ---------- */
async function loadData(){
  setStatus("loading","데이터를 불러오는 중…");
  try{ const res=await fetch(JSON_URL,{cache:"no-store"});
    if(res.ok){ const raw=await res.json(); if(Array.isArray(raw)&&raw.length){ DATA=withTrack(raw); return onLoaded(JSON_URL);} }
  }catch(e){}
  try{ const res=await fetch(XLSX_URL,{cache:"no-store"}); if(!res.ok) throw 0;
    const buf=await res.arrayBuffer(); DATA=withTrack(parseJeongsi(XLSX.read(buf,{type:"array"}))); return onLoaded(XLSX_URL);
  }catch(e){}
  setStatus("err","불러올 데이터가 없습니다. ‘엑셀 업로드’ 버튼으로 파일을 선택하세요.");
}
function loadFromFile(file){
  const fr=new FileReader();
  if(file.name.toLowerCase().endsWith(".json")){
    fr.onload=e=>{ try{ DATA=withTrack(JSON.parse(e.target.result)); onLoaded(file.name);}catch(err){ setStatus("err","JSON 형식을 읽을 수 없습니다.");} };
    fr.readAsText(file);
  }else{
    fr.onload=e=>{ DATA=withTrack(parseJeongsi(XLSX.read(e.target.result,{type:"array"}))); onLoaded(file.name); };
    fr.readAsArrayBuffer(file);
  }
}
function exportJson(){
  const raw=DATA.map(d=>{const o={};RAW_KEYS.forEach(k=>o[k]=d[k]);return o;});
  const blob=new Blob([JSON.stringify(raw,null,1)],{type:"application/json;charset=utf-8"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="data_정시.json"; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
function onLoaded(srcName){
  const unis=new Set(DATA.map(d=>d.대학)).size;
  setStatus("ok",`${srcName} · 대학 ${unis}곳 · 모집단위 ${DATA.length.toLocaleString()}개`);
  $("#jsonBtn").hidden=false; render();
}
function setStatus(kind,text){
  $("#dot").className="dot"+(kind==="ok"?" ok":kind==="err"?" err":"");
  $("#statusText").textContent=text;
}

/* ---------- 필터 / 매칭 ---------- */
const cutAvg = d => cut==="50"?d.평균50:d.평균70;
const cutKor = d => cut==="50"?d.국50:d.국70;
const cutMat = d => cut==="50"?d.수50:d.수70;
const cutTam = d => cut==="50"?d.탐50:d.탐70;
const cutEng = d => cut==="50"?d.영어50:d.영어70;
const cutHis = d => cut==="50"?d.한국사50:d.한국사70;
const byGun = d => gunFilter==="all" || d.군===gunFilter;
const byTrack = d => trackFilter==="all" || d.계열===trackFilter || d.계열==="미정";
const inFilter = d => byGun(d) && byTrack(d);

/* 계열 연동 가중평균 (영어 제외 → 비율 정규화)
   자연(이과) 국25:수33:탐27 · 인문(문과) 국30:수30:탐25
   예체능 국50:탐50(수학 미반영) · 전체 단순평균.
   입력 안 한 과목은 가중치에서 제외하고 남은 과목으로 정규화. */
function weightTrack(){
  if(trackFilter==="자연") return {k:25,m:33,t:27, name:"자연(이과) 가중"};
  if(trackFilter==="인문") return {k:30,m:30,t:25, name:"인문(문과) 가중"};
  if(trackFilter==="예체능") return {k:50,m:0,t:50, name:"예체능 가중(국·탐만)"};
  return {k:1,m:1,t:1, name:"단순평균"};
}
function myAverage(){
  const k=num($("#korIn").value), m=num($("#matIn").value);
  const t1=num($("#t1In").value), t2=num($("#t2In").value);
  const tam=[t1,t2].filter(v=>v!=null);
  const tamAvg = tam.length ? tam.reduce((a,b)=>a+b,0)/tam.length : null;
  const w=weightTrack();
  const items=[[k,w.k],[m,w.m],[tamAvg,w.t]].filter(x=>x[0]!=null);
  if(!items.length) return null;
  const wsum=items.reduce((a,x)=>a+x[1],0);
  return r1(items.reduce((a,x)=>a+x[0]*x[1],0)/wsum);
}

/* ---------- 렌더 ---------- */
function render(){ mode==="predict" ? renderPredict() : renderSearch(); }

function renderPredict(){
  $("#summary").hidden=true;
  const my=myAverage();
  const box=$("#myAvgBox");
  if(my==null){ box.hidden=true;
    return emptyState("국어·수학·탐구 백분위를 입력해 주세요","세 영역 백분위를 넣으면 내 평균백분위로 지원 가능 학과를 찾습니다.");
  }
  box.hidden=false; $("#myAvg").textContent=my.toFixed(1);
  const up=num($("#upIn").value)??0, down=num($("#downIn").value)??0;
  const lo=my-down, hi=my+up;
  const cutLabel = cut+"%컷 평균백분위";
  const wname = weightTrack().name;
  $("#windowHint").innerHTML=`계열 필터에 따라 <b style="color:var(--ink)">${wname}</b>으로 계산했습니다. <b style="color:var(--ink)">${lo.toFixed(1)} ~ ${hi.toFixed(1)}</b> 범위의 ${cutLabel} 학과를 표시합니다. (영어·한국사는 참고용)`;

  let list=DATA.filter(d=>inFilter(d)).map(d=>({d,v:cutAvg(d)}))
    .filter(x=>x.v!=null && x.v>=lo && x.v<=hi)
    .sort((a,b)=>b.v-a.v);   // 백분위 높은(상향) 순

  let nR=0,nF=0,nS=0;
  list.forEach(x=>{const diff=x.v-my; x.zone=diff>1?"reach":diff<-1?"safe":"fit";
    x.zone==="reach"?nR++:x.zone==="safe"?nS++:nF++;});
  const s=$("#summary"); s.hidden=false;
  s.innerHTML=`<span class="chip total">전체 <b>${list.length}</b></span>
    <span class="chip reach">상향 <b>${nR}</b></span>
    <span class="chip fit">적정 <b>${nF}</b></span>
    <span class="chip safe">안정 <b>${nS}</b></span>`;
  if(!list.length) return emptyState("범위 안에 학과가 없습니다","‘상향·하향 여유’를 넓히거나 군·계열 필터를 바꿔보세요.");
  drawTable(list, true);
}

function renderSearch(){
  const q=$("#searchIn").value.trim();
  if(!q) return emptyState("대학명 또는 학과명을 입력하세요","일부만 입력해도 관련 학과가 모두 검색됩니다.");
  const qq=q.toLowerCase();
  const list=DATA.filter(d=>inFilter(d) &&
      ((d.대학||"").toLowerCase().includes(qq) || (d.모집단위||"").toLowerCase().includes(qq)))
    .map(d=>({d,v:cutAvg(d)})).sort((a,b)=>(b.v??-1)-(a.v??-1));
  if(!list.length) return emptyState(`‘${q}’ 검색 결과가 없습니다`,"다른 키워드로 시도하거나 필터를 확인하세요.");
  drawTable(list, false);
}

function fmt(v){return v==null||v===""?'<span class="na">—</span>':(typeof v==="number"&&!Number.isInteger(v)?v.toFixed(1):v);}

function drawTable(list, showZone){
  const head=`<thead><tr>
    <th>대학</th><th>군</th><th>전형명 · 모집단위</th>
    <th class="num">모집</th><th class="num">경쟁률</th>
    <th class="num">국어</th><th class="num">수학</th><th class="num">탐구</th>
    <th class="num">평균<br>${cut}%</th><th class="num">평균<br>등급</th><th class="num">영/한</th>
    ${showZone?'<th>구분</th>':''}</tr></thead>`;
  const body=list.map(({d,zone})=>{
    const trk=d.계열==="인문"?'<span class="tag humn">인문</span>':d.계열==="자연"?'<span class="tag natu">자연</span>':d.계열==="예체능"?'<span class="tag arts">예체능</span>':d.계열==="미정"?'<span class="tag undf">자율</span>':'';
    const zoneCell=showZone?`<td data-l="구분"><span class="zone ${zone}">${zone==="reach"?"상향":zone==="safe"?"안정":"적정"}</span></td>`:'';
    const eh=`${fmt(cutEng(d))}·${fmt(cutHis(d))}`;
    const gr=pctToGrade(cutAvg(d));
    return `<tr>
      <td class="uni" data-l="대학">${d.대학}</td>
      <td data-l="군"><span class="tag gun">${d.군}</span></td>
      <td data-l="학과"><span style="display:inline-flex;gap:4px;flex-wrap:wrap;align-items:center"><span class="dept">${d.모집단위}</span>${trk}</span><br><span class="typename">${d.전형명||""}</span></td>
      <td class="num" data-l="모집">${fmt(d.최종모집)}</td>
      <td class="num" data-l="경쟁률">${fmt(d.경쟁률)}</td>
      <td class="num" data-l="국어">${fmt(cutKor(d))}</td>
      <td class="num" data-l="수학">${fmt(cutMat(d))}</td>
      <td class="num" data-l="탐구">${fmt(cutTam(d))}</td>
      <td class="num cut-on" data-l="평균">${fmt(cutAvg(d))}</td>
      <td class="num" data-l="평균등급">${gr==null?'<span class="na">—</span>':gr.toFixed(1)}</td>
      <td class="num" data-l="영/한">${eh}</td>
      ${zoneCell}</tr>`;
  }).join("");
  $("#results").innerHTML=`<div class="panel" style="padding:18px 22px"><table>${head}<tbody>${body}</tbody></table></div>`;
}
function emptyState(big,sm){
  $("#results").innerHTML=`<div class="panel"><div class="empty"><div class="big">${big}</div><div class="sm">${sm}</div></div></div>`;
}

/* ---------- 이벤트 ---------- */
document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  b.classList.add("active"); mode=b.dataset.mode;
  $("#predictPanel").hidden=mode!=="predict"; $("#searchPanel").hidden=mode!=="search"; render();
});
function segHandler(id,setter){ $(id).onclick=e=>{const b=e.target.closest("button");if(!b)return;
  $(id).querySelectorAll("button").forEach(x=>x.classList.remove("on")); b.classList.add("on"); setter(b); render();}; }
segHandler("#gunSeg", b=>gunFilter=b.dataset.g);
segHandler("#trackSeg", b=>trackFilter=b.dataset.k);
segHandler("#cutSeg", b=>cut=b.dataset.c);
["#korIn","#matIn","#t1In","#t2In","#upIn","#downIn"].forEach(s=>$(s).addEventListener("input",()=>{if(mode==="predict")renderPredict();}));
$("#searchIn").addEventListener("input",()=>{if(mode==="search")renderSearch();});
$("#convGrade").addEventListener("input",()=>{
  const p=gradeToPct(num($("#convGrade").value));
  $("#convPct").textContent = p==null ? "–" : p;
});
$("#fileInput").onchange=e=>{ if(e.target.files[0]) loadFromFile(e.target.files[0]); e.target.value=""; };
$("#jsonBtn").onclick=exportJson;
loadData();
</script>
